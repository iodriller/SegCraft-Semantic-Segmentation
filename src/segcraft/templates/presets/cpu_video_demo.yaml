task:
  type: multiclass
  num_classes: 19
  class_names:
    - road
    - sidewalk
    - building
    - wall
    - fence
    - pole
    - traffic_light
    - traffic_sign
    - vegetation
    - terrain
    - sky
    - person
    - rider
    - car
    - truck
    - bus
    - train
    - motorcycle
    - bicycle
  background_class_id:

model:
  name: nvidia/segformer-b0-finetuned-cityscapes-1024-1024
  backend: transformers
  pretrained: true

data:
  image_size: [256, 512]
  batch_size: 1
  num_workers: 0

predict:
  overlay_alpha: 0.38
  video_max_seconds: 10
  video_frame_stride: 4
  display:
    palette: vivid
    show_panel: true
    show_floating_labels: false
    max_classes: 8
    panel_position: top_right

runtime:
  device: cpu
