task:
  type: multiclass
  num_classes: 19
  # These labels come from the Cityscapes checkpoint. Keep them aligned with the model.
  class_names:
    - road
    - sidewalk
    - building
    - wall
    - fence
    - pole
    - traffic_light
    - traffic_sign
    - vegetation
    - terrain
    - sky
    - person
    - rider
    - car
    - truck
    - bus
    - train
    - motorcycle
    - bicycle
  ignore_index: 255
  background_class_id:

model:
  name: nvidia/segformer-b0-finetuned-cityscapes-1024-1024
  backend: transformers
  pretrained: true

data:
  image_size: [512, 1024]
  batch_size: 1
  num_workers: 0

predict:
  overlay_alpha: 0.38
  video_max_seconds:
  video_frame_stride: 1
  display:
    palette: vivid
    show_panel: true
    show_floating_labels: false
    show_confidence: true
    show_percentages: true
    max_classes: 8
    max_labels: 10
    label_min_pixels: 2400
    label_move_threshold: 96
    label_smoothing: 0.85
    panel_position: top_right
