model:
  name: deeplabv3_resnet101
  backend: torchvision
  pretrained: true

data:
  image_size: [512, 896]
  batch_size: 1
  num_workers: 0

predict:
  overlay_alpha: 0.42
  video_max_seconds: 30
  video_frame_stride: 1
  display:
    palette: vivid
    show_panel: true
    show_floating_labels: false
    show_confidence: true
    show_percentages: true
    max_classes: 8
    panel_position: top_right
