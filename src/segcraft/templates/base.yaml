task:
  type: multiclass
  # num_classes controls trainable model heads. class_names are display labels;
  # missing or mismatched names fall back to class_<id> during prediction.
  # This base config matches TorchVision's PASCAL/VOC segmentation weights.
  num_classes: 21
  class_names:
    - background
    - aeroplane
    - bicycle
    - bird
    - boat
    - bottle
    - bus
    - car
    - cat
    - chair
    - cow
    - diningtable
    - dog
    - horse
    - motorbike
    - person
    - pottedplant
    - sheep
    - sofa
    - train
    - tvmonitor
  ignore_index: 255
  background_class_id: 0

model:
  # backend: auto, torchvision, smp, or transformers.
  # torchvision: deeplabv3_resnet50, deeplabv3_resnet101, fcn_resnet50,
  #   fcn_resnet101, lraspp_mobilenet_v3_large.
  # smp: unet, unetplusplus, fpn, linknet, pspnet (optionally set encoder).
  # transformers: Hugging Face semantic segmentation model ids, for example
  #   nvidia/segformer-b0-finetuned-cityscapes-1024-1024.
  name: deeplabv3_resnet50
  backend: torchvision
  pretrained: true

data:
  train_images: data/train/images
  train_masks: data/train/masks
  val_images: data/val/images
  val_masks: data/val/masks
  image_size: [512, 512]
  batch_size: 4
  num_workers: 4
  mask_suffix: ""

train:
  epochs: 20
  optimizer: adam
  learning_rate: 0.0003
  loss: auto
  scheduler: none
  amp: false
  resume_from:
  early_stopping_patience:

eval:
  metrics: []

predict:
  input_path: data/infer/images
  output_path: outputs/predictions
  overlay_alpha: 0.5
  annotate: true
  save_video: true
  video_fps: 6
  video_max_seconds:
  video_frame_stride: 1
  video_path:
  preserve_audio: true
  display:
    palette: vivid
    show_panel: true
    show_floating_labels: false
    show_confidence: true
    show_percentages: true
    max_classes: 6
    max_labels: 8
    label_min_pixels: 1200
    label_move_threshold: 96
    label_smoothing: 0.85
    panel_position: bottom_left

runtime:
  seed: 42
  device: auto
  output_dir: outputs
