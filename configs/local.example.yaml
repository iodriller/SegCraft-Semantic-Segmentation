# Copy this to configs/local.yaml and edit for your machine-specific paths.
data:
  train_images: /absolute/path/to/train/images
  train_masks: /absolute/path/to/train/masks
  val_images: /absolute/path/to/val/images
  val_masks: /absolute/path/to/val/masks
  # For 16:9 video prediction, a size like [360, 640] avoids square-frame distortion.
  image_size: [512, 512]
  # Set this to "_mask" if masks are named image_001_mask.png for image_001.jpg.
  mask_suffix: ""
predict:
  input_path: /absolute/path/to/inference/images_or_video.mp4
  output_path: /absolute/path/to/predictions
  annotate: true
  save_video: true
  video_max_seconds:
  video_frame_stride: 1
  preserve_audio: true
  display:
    show_panel: true
    show_floating_labels: false
    show_confidence: true
    show_percentages: true
    label_move_threshold: 96
    label_smoothing: 0.85
train:
  # Optional: set a checkpoint path to continue a run.
  resume_from:
runtime:
  output_dir: /absolute/path/to/outputs
