task:
  type: multiclass
  num_classes: 21
  class_names:
    - background
    - aeroplane
    - bicycle
    - bird
    - boat
    - bottle
    - bus
    - car
    - cat
    - chair
    - cow
    - diningtable
    - dog
    - horse
    - motorbike
    - person
    - pottedplant
    - sheep
    - sofa
    - train
    - tvmonitor
  ignore_index: 255

model:
  name: deeplabv3_resnet50
  backend: torchvision
  pretrained: true

data:
  train_images: data/train/images
  train_masks: data/train/masks
  val_images: data/val/images
  val_masks: data/val/masks
  image_size: [512, 512]
  batch_size: 4
  num_workers: 4
  mask_suffix: ""

train:
  epochs: 20
  optimizer: adam
  learning_rate: 0.0003
  loss: auto
  scheduler: none
  amp: false
  resume_from:
  early_stopping_patience:

eval:
  metrics: []

predict:
  input_path: data/infer/images
  output_path: outputs/predictions
  overlay_alpha: 0.5
  annotate: true
  save_video: true
  video_fps: 6
  video_path:
  preserve_audio: true

runtime:
  seed: 42
  device: auto
  output_dir: outputs
