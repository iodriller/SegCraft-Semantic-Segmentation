[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "segcraft"
version = "0.1.0"
description = "Config-driven semantic segmentation framework"
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE.md" }
authors = [{ name = "SegCraft Contributors" }]
dependencies = [
  "PyYAML>=6.0",
]

[project.scripts]
segcraft = "segcraft.cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
